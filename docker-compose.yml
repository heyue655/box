services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: heyue-box:latest
    container_name: heyue-box
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-90d}
