<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#3d1a00"/>
      <stop offset="100%" stop-color="#1a0a00"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066"/>
      <stop offset="100%" stop-color="#c9842a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- ===== 宝塔 ===== -->

  <!-- 第三层（最小，顶层） -->
  <!-- 墙体 -->
  <rect x="83" y="76" width="34" height="20" rx="2" fill="#c9842a"/>
  <!-- 屋顶 -->
  <polygon points="100,55 125,78 75,78" fill="#c0392b"/>
  <!-- 飞檐上翘 -->
  <line x1="75" y1="78" x2="68" y2="74" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
  <line x1="125" y1="78" x2="132" y2="74" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
  <!-- 檐端宝球 -->
  <circle cx="68" cy="73" r="3" fill="#e8c87a"/>
  <circle cx="132" cy="73" r="3" fill="#e8c87a"/>
  <!-- 屋脊宝珠 -->
  <circle cx="100" cy="53" r="5" fill="#e8c87a"/>
  <!-- 门窗 -->
  <rect x="93" y="82" width="14" height="14" rx="7" fill="#1a0a00" opacity="0.6"/>

  <!-- 第二层（中层） -->
  <!-- 墙体 -->
  <rect x="68" y="104" width="64" height="24" rx="2" fill="#c9842a"/>
  <!-- 屋顶 -->
  <polygon points="100,84 140,106 60,106" fill="#c0392b"/>
  <!-- 飞檐 -->
  <line x1="60" y1="106" x2="50" y2="100" stroke="#c0392b" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="140" y1="106" x2="150" y2="100" stroke="#c0392b" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="50" cy="99" r="3.5" fill="#e8c87a"/>
  <circle cx="150" cy="99" r="3.5" fill="#e8c87a"/>
  <!-- 窗洞 -->
  <rect x="76" y="110" width="12" height="14" rx="6" fill="#1a0a00" opacity="0.55"/>
  <rect x="112" y="110" width="12" height="14" rx="6" fill="#1a0a00" opacity="0.55"/>
  <rect x="94" y="110" width="12" height="14" rx="6" fill="#1a0a00" opacity="0.55"/>

  <!-- 第一层（最大，底层） -->
  <!-- 墙体 -->
  <rect x="50" y="134" width="100" height="28" rx="2" fill="#c9842a"/>
  <!-- 屋顶 -->
  <polygon points="100,112 154,136 46,136" fill="#c0392b"/>
  <!-- 飞檐 -->
  <line x1="46" y1="136" x2="33" y2="128" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
  <line x1="154" y1="136" x2="167" y2="128" stroke="#c0392b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="33" cy="127" r="4" fill="#e8c87a"/>
  <circle cx="167" cy="127" r="4" fill="#e8c87a"/>
  <!-- 大门 -->
  <rect x="88" y="140" width="24" height="22" rx="12" fill="#1a0a00" opacity="0.6"/>
  <!-- 侧窗 -->
  <rect x="57" y="142" width="14" height="16" rx="7" fill="#1a0a00" opacity="0.45"/>
  <rect x="129" y="142" width="14" height="16" rx="7" fill="#1a0a00" opacity="0.45"/>

  <!-- 台基 -->
  <rect x="40" y="162" width="120" height="10" rx="3" fill="#7a4a10"/>
  <rect x="32" y="170" width="136" height="8" rx="3" fill="#5a3508"/>

  <!-- 金色装饰横线 -->
  <line x1="50" y1="130" x2="150" y2="130" stroke="#e8c87a" stroke-width="0.8" opacity="0.5"/>
  <line x1="68" y1="100" x2="132" y2="100" stroke="#e8c87a" stroke-width="0.8" opacity="0.5"/>
  <line x1="83" y1="72" x2="117" y2="72" stroke="#e8c87a" stroke-width="0.8" opacity="0.5"/>

  <!-- 标题文字：万象阁 -->
  <text x="100" y="196" text-anchor="middle" font-family="serif" font-size="14" font-weight="bold" fill="#e8c87a" letter-spacing="3">万象阁</text>
</svg>
