<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7C948"/>
      <stop offset="100%" stop-color="#C8860A"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE680"/>
      <stop offset="100%" stop-color="#A06800"/>
    </linearGradient>
  </defs>
  <!-- 外圈（金币边缘） -->
  <circle cx="16" cy="16" r="15.5" fill="url(#rim)"/>
  <!-- 内圈（金币面） -->
  <circle cx="16" cy="16" r="12.5" fill="url(#bg)"/>
  <!-- 高光 -->
  <ellipse cx="12" cy="11" rx="4" ry="2.5" fill="white" opacity="0.18"/>
  <!-- "金"字 -->
  <text x="16" y="21.5"
        font-family="'PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif"
        font-size="13"
        font-weight="bold"
        fill="#5C3A00"
        text-anchor="middle"
        letter-spacing="0">金</text>
</svg>
