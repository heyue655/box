<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1b2d"/>
    </linearGradient>
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- 书本 - 封面 -->
  <rect x="14" y="12" width="36" height="40" rx="3" fill="url(#cover)"/>
  <!-- 书页 -->
  <rect x="17" y="14" width="30" height="36" rx="2" fill="#f5f0e0"/>
  <!-- 书脊 -->
  <rect x="14" y="12" width="5" height="40" rx="2" fill="#a07d2e"/>
  <!-- 竖排文字"太虚" -->
  <text x="32" y="30" font-family="serif" font-size="11" font-weight="bold" fill="#1e3a5f" text-anchor="middle">太虚</text>
  <text x="32" y="44" font-family="serif" font-size="11" font-weight="bold" fill="#1e3a5f" text-anchor="middle">书院</text>
  <!-- 装饰线 -->
  <line x1="24" y1="17" x2="44" y2="17" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
  <line x1="24" y1="47" x2="44" y2="47" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
</svg>
